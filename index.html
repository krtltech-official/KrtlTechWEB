<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrtlTech Official</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p {
            color: #8b949e;
            margin-bottom: 25px;
        }
        .audio-player {
            margin-top: 20px;
            background: #21262d;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }
        audio {
            width: 300px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KRTLTECH</h1>
        <p>Official Web Project</p>
        
        <div class="audio-player">
            <audio controls src="ses.mp3"></audio>
        </div>
    </div>

</body>
</html>
